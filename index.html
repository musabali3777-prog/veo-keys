<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veo — Key Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --accent: #dc2626;
            --accent-glow: rgba(220, 38, 38, 0.3);
            --text: #e4e4e7;
            --text-dim: #71717a;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Config Panel */
        .config-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .config-panel h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .config-grid input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .config-grid input:focus {
            border-color: var(--accent);
        }

        .config-grid input::placeholder {
            color: var(--text-dim);
        }

        .btn-connect {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-connect:hover {
            background: #b91c1c;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .status {
            display: inline-block;
            margin-left: 12px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .status.connected { color: var(--green); }
        .status.error { color: var(--red); }

        /* Generate Section */
        .generate-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .generate-panel h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .duration-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .duration-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 20px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .duration-btn:hover {
            border-color: var(--accent);
            background: rgba(220, 38, 38, 0.1);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .generated-key {
            margin-top: 16px;
            padding: 14px 18px;
            background: var(--surface2);
            border: 1px solid var(--green);
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .generated-key.show { display: flex; }

        .generated-key code {
            font-size: 1rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.04em;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 14px;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-copy:hover { border-color: var(--text); color: var(--text); }

        /* Keys Table */
        .keys-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .keys-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .keys-header h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        .key-count {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 12px 24px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 14px 24px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(42, 42, 58, 0.5);
        }

        tbody tr:hover { background: rgba(255, 255, 255, 0.02); }

        .key-cell {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-active { background: rgba(34, 197, 94, 0.15); color: var(--green); }
        .badge-expired { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
        .badge-revoked { background: rgba(239, 68, 68, 0.15); color: var(--red); }

        .btn-revoke {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 12px;
            color: var(--red);
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-revoke:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--red);
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 0.85rem;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 640px) {
            .config-grid { grid-template-columns: 1fr; }
            .duration-btns { flex-direction: column; }
            thead th, tbody td { padding: 10px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>VEO</h1>
            <p>License Key Management Dashboard</p>
        </div>

        <!-- GitHub Config -->
        <div class="config-panel">
            <h2>GitHub Connection</h2>
            <div class="config-grid">
                <input type="password" id="token" placeholder="GitHub Token (ghp_...)" />
                <input type="text" id="repo" placeholder="username/repo-name" />
                <input type="text" id="branch" placeholder="Branch (main)" value="main" />
            </div>
            <button class="btn-connect" onclick="connect()">Connect & Load Keys</button>
            <span class="status" id="status"></span>
        </div>

        <!-- Generate Keys -->
        <div class="generate-panel">
            <h2>Generate Key</h2>
            <div class="duration-btns">
                <button class="duration-btn" onclick="generateKey('1min')">1 Minute</button>
                <button class="duration-btn" onclick="generateKey('1day')">1 Day</button>
                <button class="duration-btn" onclick="generateKey('1week')">1 Week</button>
                <button class="duration-btn" onclick="generateKey('1month')">1 Month</button>
                <button class="duration-btn" onclick="generateKey('1year')">1 Year</button>
            </div>
            <div class="generated-key" id="generatedKey">
                <code id="generatedKeyText"></code>
                <button class="btn-copy" onclick="copyKey()">Copy</button>
            </div>
        </div>

        <!-- Keys List -->
        <div class="keys-panel">
            <div class="keys-header">
                <h2>Active Keys</h2>
                <span class="key-count" id="keyCount">0 keys</span>
            </div>
            <div id="keysBody">
                <div class="empty-state">Connect to GitHub to load keys</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let keysData = { keys: {} };
        let fileSha = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function setStatus(text, type) {
            const s = document.getElementById('status');
            s.textContent = text;
            s.className = 'status ' + type;
        }

        function getConfig() {
            return {
                token: document.getElementById('token').value.trim(),
                repo: document.getElementById('repo').value.trim(),
                branch: document.getElementById('branch').value.trim() || 'main'
            };
        }

        async function connect() {
            const cfg = getConfig();
            if (!cfg.token || !cfg.repo) {
                setStatus('Fill in token and repo', 'error');
                return;
            }

            setStatus('Connecting...', '');

            try {
                const url = `https://api.github.com/repos/${cfg.repo}/contents/keys.json?ref=${cfg.branch}`;
                const res = await fetch(url, {
                    headers: {
                        'Authorization': `token ${cfg.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (res.status === 404) {
                    // File doesn't exist yet, create empty
                    keysData = { keys: {} };
                    fileSha = null;
                    setStatus('Connected (new repo)', 'connected');
                    renderKeys();
                    // Save initial file
                    await pushToGithub();
                    return;
                }

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                fileSha = data.sha;
                const content = atob(data.content.replace(/\n/g, ''));
                keysData = JSON.parse(content);

                setStatus('Connected', 'connected');
                renderKeys();
                
                // Save config to localStorage
                localStorage.setItem('veo_token', cfg.token);
                localStorage.setItem('veo_repo', cfg.repo);
                localStorage.setItem('veo_branch', cfg.branch);
            } catch (e) {
                setStatus('Failed: ' + e.message, 'error');
            }
        }

        async function pushToGithub() {
            const cfg = getConfig();
            const content = btoa(JSON.stringify(keysData, null, 2));
            const url = `https://api.github.com/repos/${cfg.repo}/contents/keys.json`;

            const body = {
                message: `Update keys — ${new Date().toISOString()}`,
                content: content,
                branch: cfg.branch
            };
            if (fileSha) body.sha = fileSha;

            const res = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${cfg.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!res.ok) throw new Error(`Push failed: ${res.status}`);

            const data = await res.json();
            fileSha = data.content.sha;
        }

        function makeKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            const part = () => Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            return `VEO-${part()}-${part()}-${part()}`;
        }

        const DURATIONS = {
            '1min':   60 * 1000,
            '1day':   24 * 60 * 60 * 1000,
            '1week':  7 * 24 * 60 * 60 * 1000,
            '1month': 30 * 24 * 60 * 60 * 1000,
            '1year':  365 * 24 * 60 * 60 * 1000,
        };

        async function generateKey(duration) {
            const cfg = getConfig();
            if (!cfg.token || !cfg.repo) {
                showToast('Connect to GitHub first');
                return;
            }

            const key = makeKey();
            const now = new Date();
            const expires = new Date(now.getTime() + DURATIONS[duration]);

            keysData.keys[key] = {
                created: now.toISOString().replace(/\.\d+Z$/, 'Z'),
                expires: expires.toISOString().replace(/\.\d+Z$/, 'Z'),
                duration: duration,
                active: true
            };

            try {
                await pushToGithub();
                renderKeys();

                const el = document.getElementById('generatedKey');
                document.getElementById('generatedKeyText').textContent = key;
                el.classList.add('show');

                showToast(`Key generated: ${duration}`);
            } catch (e) {
                showToast('Failed to push: ' + e.message);
            }
        }

        async function revokeKey(key) {
            if (!confirm(`Revoke ${key}?`)) return;

            keysData.keys[key].active = false;

            try {
                await pushToGithub();
                renderKeys();
                showToast('Key revoked');
            } catch (e) {
                showToast('Failed: ' + e.message);
            }
        }

        function copyKey() {
            const text = document.getElementById('generatedKeyText').textContent;
            navigator.clipboard.writeText(text);
            showToast('Copied to clipboard');
        }

        function getKeyStatus(info) {
            if (!info.active) return 'revoked';
            const exp = new Date(info.expires);
            if (exp < new Date()) return 'expired';
            return 'active';
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                 + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        const DURATION_LABELS = {
            '1min': '1 Min', '1day': '1 Day', '1week': '1 Week',
            '1month': '1 Month', '1year': '1 Year'
        };

        function renderKeys() {
            const keys = Object.entries(keysData.keys);
            const count = keys.length;
            document.getElementById('keyCount').textContent = `${count} key${count !== 1 ? 's' : ''}`;

            if (count === 0) {
                document.getElementById('keysBody').innerHTML = '<div class="empty-state">No keys yet. Generate one above.</div>';
                return;
            }

            // Sort: active first, then by creation date desc
            keys.sort((a, b) => {
                const sa = getKeyStatus(a[1]), sb = getKeyStatus(b[1]);
                if (sa === 'active' && sb !== 'active') return -1;
                if (sb === 'active' && sa !== 'active') return 1;
                return new Date(b[1].created) - new Date(a[1].created);
            });

            let html = `<table><thead><tr>
                <th>Key</th><th>Duration</th><th>Expires</th><th>Status</th><th></th>
            </tr></thead><tbody>`;

            for (const [key, info] of keys) {
                const status = getKeyStatus(info);
                html += `<tr>
                    <td class="key-cell">${key}</td>
                    <td>${DURATION_LABELS[info.duration] || info.duration}</td>
                    <td>${formatDate(info.expires)}</td>
                    <td><span class="badge badge-${status}">${status}</span></td>
                    <td>${status === 'active' ? `<button class="btn-revoke" onclick="revokeKey('${key}')">Revoke</button>` : ''}</td>
                </tr>`;
            }

            html += '</tbody></table>';
            document.getElementById('keysBody').innerHTML = html;
        }

        // Load saved config
        window.addEventListener('DOMContentLoaded', () => {
            const t = localStorage.getItem('veo_token');
            const r = localStorage.getItem('veo_repo');
            const b = localStorage.getItem('veo_branch');
            if (t) document.getElementById('token').value = t;
            if (r) document.getElementById('repo').value = r;
            if (b) document.getElementById('branch').value = b;
            if (t && r) connect();
        });
    </script>
</body>
</html>
